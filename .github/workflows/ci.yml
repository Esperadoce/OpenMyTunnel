name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/OpenMyTunnel/OpenMyTunnel.csproj

      - name: Build
        run: dotnet build src/OpenMyTunnel/OpenMyTunnel.csproj -c Release --no-restore
